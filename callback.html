<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VetA — E-posta Doğrulandı</title>
  <style>
    body { background: #0A0F1E; color: #e5e7eb; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    .wrap { max-width: 400px; }
    .tick { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 1.5rem; color: #fff; margin-bottom: 12px; }
    p { color: #9ca3af; margin-bottom: 32px; }
    a.btn { display: inline-block; padding: 14px 32px; background: #0d6e4f; color: #fff; border-radius: 12px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tick">✅</div>
    <h1>E-posta adresiniz doğrulandı!</h1>
    <p>Uygulamaya dönüp giriş yapabilirsiniz.</p>
    <a href="veta://login-callback" class="btn">Uygulamayı Aç</a>
  </div>
  <script>
    // Deep link ile uygulamayı aç
    setTimeout(() => {
      window.location.href = 'veta://login-callback';
    }, 1500);
  </script>
</body>
</html>
